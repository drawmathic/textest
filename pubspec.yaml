name: brutalist_exam_app
description: Professional-grade, competitive-exam test-taking Android application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.3
  flutter_math_fork: ^0.7.2
  shared_preferences: ^2.2.2
  markdown: ^7.3.1
  fl_chart: ^0.66.0
  intl: ^0.19.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

# Automated Icon Configuration
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
